<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio AI Side Panel</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: #1a1a1a;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      background-color: #1a1a1a;
    }
    .header-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      background-color: #555;
      border-radius: 50%;
    }
    .status-dot.active {
      background-color: #ff5252;
      box-shadow: 0 0 8px #ff5252;
      animation: pulse 1.5s infinite;
    }
    .panel-title {
      font-size: 1.1rem;
      font-weight: bold;
    }
    .control-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
      background-color: #2e7d32;
      color: white;
    }
    .control-btn.active {
      background-color: #c62828;
    }
    .clear-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .clear-btn:hover {
      color: #ff5252;
    }
    #transcript-container {
      flex-grow: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    /* Card Styles */
    .utterance-card {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95rem;
      line-height: 1.4;
      border-left: 3px solid #4a90e2;
      word-wrap: break-word;
    }
    .utterance-card.finalized {
      border-left-color: #444;
    }
    .ai-response-card {
      background: #1e2a3a;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95rem;
      line-height: 1.4;
      border-left: 3px solid #4a90e2;
      margin-left: 12px;
      position: relative;
    }
    .ai-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: bold;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 8px;
      background: #333;
    }
    .ai-badge.answer { background: #2e7d32; }
    .ai-badge.suggestion { background: #1565c0; }
    .ai-badge.loading { animation: pulse 1.5s infinite; }
    .copy-button {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #ccc;
      padding: 4px;
      border-radius: 4px;
      cursor: pointer;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title-row">
      <div class="title-group">
        <div id="dot" class="status-dot"></div>
        <span class="panel-title">Audio AI Assistant</span>
      </div>
      <button id="clear-btn" class="clear-btn" title="Clear Chat">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      </button>
    </div>
    <button id="toggle-btn" class="control-btn">Start Capture</button>
  </div>
  <div id="transcript-container"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
